name: Auto Merge Data PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - 'data/**'

jobs:
  analyze-files:
    runs-on: ubuntu-latest
    outputs:
      only_data: ${{ steps.check-files.outputs.only_data }}
      data_files: ${{ steps.check-files.outputs.data_files }}
      other_files: ${{ steps.check-files.outputs.other_files }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check changed files
        id: check-files
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const fileNames = files.map(f => f.filename);
            const dataFiles = fileNames.filter(f => f.startsWith('data/') && f.endsWith('.json'));
            const otherFiles = fileNames.filter(f => !f.startsWith('data/'));

            console.log('All changed files:', fileNames);
            console.log('Data files:', dataFiles);
            console.log('Other files:', otherFiles);

            // 检查是否只有 data 目录下的 JSON 文件
            const onlyData = dataFiles.length > 0 && otherFiles.length === 0;

            core.setOutput('only_data', onlyData);
            core.setOutput('data_files', dataFiles.join(', ') || 'none');
            core.setOutput('other_files', otherFiles.join(', ') || 'none');

            if (onlyData) {
              console.log('✅ Only data files changed. Eligible for auto-merge.');
            } else {
              console.log('❌ Non-data files detected. Requires manual review.');
            }

      - name: Add label for code review
        if: steps.check-files.outputs.only_data == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-manual-review']
            });

            const otherFiles = '${{ steps.check-files.outputs.other_files }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `⚠️ 此 PR 包含非数据文件的变更，需要人工审核后才能合并。\n\n检测到的非数据文件：\n${otherFiles.split(', ').map(f => '- ' + f).join('\n')}`
            });

  auto-merge:
    needs: analyze-files
    runs-on: ubuntu-latest
    if: needs.analyze-files.outputs.only_data == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          echo "Validating JSON files..."
          for file in data/*.json; do
            if [ -f "$file" ]; then
              echo "Checking: $file"
              if ! jq empty "$file" 2>/dev/null; then
                echo "❌ Invalid JSON: $file"
                exit 1
              fi
              echo "✅ Valid JSON: $file"
            fi
          done
          echo "All JSON files are valid!"

      - name: Auto-merge PR
        uses: pascalgn/automerge-action@v0.15.6
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          MERGE_LABELS: ""
          MERGE_METHOD: "squash"
          MERGE_COMMIT_MESSAGE: "Auto-merge: Update scholarship data (#{pullRequest.number})"
          MERGE_FORKS: "false"
          MERGE_RETRIES: "3"
          MERGE_RETRY_SLEEP: "10000"

      - name: Add success comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ 此 PR 仅包含数据文件变更，已通过自动合并。'
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['auto-merged']
            });
